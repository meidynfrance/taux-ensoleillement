<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
    <linearGradient id="rayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Rays -->
  <g stroke="url(#rayGrad)" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="4" x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="60"/>
    <line x1="4" y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="60" y2="32"/>
    <line x1="12.2" y1="12.2" x2="19.1" y2="19.1"/>
    <line x1="44.9" y1="44.9" x2="51.8" y2="51.8"/>
    <line x1="51.8" y1="12.2" x2="44.9" y2="19.1"/>
    <line x1="19.1" y1="44.9" x2="12.2" y2="51.8"/>
  </g>
  <!-- Sun circle -->
  <circle cx="32" cy="32" r="14" fill="url(#sunGrad)"/>
  <!-- Inner highlight -->
  <circle cx="29" cy="29" r="8" fill="#FBBF24" opacity="0.4"/>
</svg>
